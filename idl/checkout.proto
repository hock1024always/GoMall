syntax = "proto3";

package  checkout;

import "payment.proto";

option go_package = "/checkout";

service CheckoutService {
  rpc Checkout(CheckoutReq) returns (CheckoutResp) {}
  rpc GetSagaStatus(GetSagaStatusReq) returns (GetSagaStatusResp) {}  // 查询Saga状态
}

message Address {
  string street_address = 1;
  string city = 2;
  string state = 3;
  string country = 4;
  string zip_code = 5;
}

message CheckoutReq {
  uint32 user_id = 1;
  string firstname = 2;
  string lastname = 3;
  string email = 4;
  Address address = 5;
  payment.CreditCardInfo credit_card = 6;
}

message CheckoutResp {
  string order_id = 1;
  string transaction_id = 2;
  string saga_id = 3;  // 返回Saga ID用于查询状态
}

// Saga状态查询
message GetSagaStatusReq {
  string saga_id = 1;
}

message GetSagaStatusResp {
  string saga_id = 1;
  string status = 2;          // started, completed, compensating, failed
  int32 current_step = 3;     // 当前步骤索引
  repeated SagaLog logs = 4;  // 执行日志
  string created_at = 5;
  string updated_at = 6;
}

message SagaLog {
  string step = 1;
  string action = 2;   // execute | compensate
  string status = 3;   // success | failed
  string error = 4;
  string timestamp = 5;
}