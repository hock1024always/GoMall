# Redis Slave Configuration
# 绑定地址
bind 0.0.0.0

# 端口
port 6379

# 主从复制配置
replicaof redis-master 6379
# 主库密码（如果设置了的话）
# masterauth your_strong_password_here

# 从库只读
replica-read-only yes

# AOF 持久化配置
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# RDB 快照配置
save 900 1
save 300 10
save 60 10000

# 最大内存配置（从库可以设置较小）
maxmemory 256mb
maxmemory-policy allkeys-lru

# 超时设置
timeout 0
tcp-keepalive 300

# 日志级别
loglevel notice

# 数据库数量
databases 16

# 慢查询日志
slowlog-log-slower-than 10000
slowlog-max-len 128

# 客户端连接限制
maxclients 10000
