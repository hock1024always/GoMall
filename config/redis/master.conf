# Redis Master Configuration
# 绑定地址
bind 0.0.0.0

# 端口
port 6379

# 密码（生产环境必须设置）
# requirepass your_strong_password_here

# AOF 持久化配置
appendonly yes
appendfilename "appendonly.aof"
# everysec: 每秒同步一次，平衡性能和数据安全
appendfsync everysec
# 重写时不进行fsync
no-appendfsync-on-rewrite no
# AOF文件重写触发条件
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# RDB 快照配置（作为AOF的补充）
save 900 1
save 300 10
save 60 10000

# 最大内存配置
maxmemory 256mb
maxmemory-policy allkeys-lru

# 超时设置
timeout 0
tcp-keepalive 300

# 日志级别
loglevel notice

# 数据库数量
databases 16

# 慢查询日志
slowlog-log-slower-than 10000
slowlog-max-len 128

# 客户端连接限制
maxclients 10000
